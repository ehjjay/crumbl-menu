<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crumbl Weekly Menu</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink: #f4a7b9;
      --pink-deep: #e8728f;
      --cream: #fdf6f0;
      --brown: #3d1f0f;
      --warm-gray: #8a7060;
      --card-bg: #ffffff;
      --weekly-badge: #e8728f;
      --classic-badge: #a0856c;
      --today-badge: #c0392b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      color: var(--brown);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--brown);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(244,167,185,0.25) 0%, transparent 70%);
    }

    .header-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 0.6rem;
      position: relative;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      position: relative;
    }

    h1 span {
      color: var(--pink);
      font-style: italic;
    }

    .week-label {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.05em;
      position: relative;
    }

    /* REFRESH BTN */
    .refresh-bar {
      display: flex;
      justify-content: center;
      padding: 1.2rem;
      gap: 1rem;
      align-items: center;
    }

    .refresh-btn {
      background: var(--brown);
      color: #fff;
      border: none;
      padding: 0.55rem 1.4rem;
      border-radius: 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .refresh-btn:hover { background: var(--pink-deep); transform: translateY(-1px); }
    .refresh-btn:active { transform: translateY(0); }
    .refresh-btn.loading { opacity: 0.6; pointer-events: none; }

    .fetch-time {
      font-size: 0.75rem;
      color: var(--warm-gray);
    }

    /* SECTION HEADINGS */
    .section-label {
      text-align: center;
      padding: 1rem 1rem 0.4rem;
    }

    .section-label h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brown);
    }

    .section-label p {
      font-size: 0.8rem;
      color: var(--warm-gray);
      margin-top: 0.2rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--pink);
      margin: 0.5rem auto 1.5rem;
      border-radius: 2px;
    }

    /* GRID */
    .cookies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 0 1.5rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* CARD */
    .cookie-card {
      background: var(--card-bg);
      border-radius: 1.2rem;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(61,31,15,0.07);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: fadeUp 0.5s ease both;
    }

    .cookie-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(61,31,15,0.13);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .cookie-card:nth-child(1) { animation-delay: 0.05s; }
    .cookie-card:nth-child(2) { animation-delay: 0.1s; }
    .cookie-card:nth-child(3) { animation-delay: 0.15s; }
    .cookie-card:nth-child(4) { animation-delay: 0.2s; }
    .cookie-card:nth-child(5) { animation-delay: 0.25s; }
    .cookie-card:nth-child(6) { animation-delay: 0.3s; }

    .card-image-wrap {
      position: relative;
      width: 100%;
      padding-top: 75%;
      background: #f9ede8;
      overflow: hidden;
    }

    .card-image-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .cookie-card:hover .card-image-wrap img {
      transform: scale(1.04);
    }

    .badge {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      color: #fff;
    }

    .badge.weekly  { background: var(--weekly-badge); }
    .badge.classic { background: var(--classic-badge); }
    .badge.today   { background: var(--today-badge); }

    .card-body {
      padding: 1rem 1.1rem 1.2rem;
    }

    .card-body h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brown);
      line-height: 1.3;
      margin-bottom: 0.45rem;
    }

    .card-body p {
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--warm-gray);
    }

    .card-link {
      display: inline-block;
      margin-top: 0.8rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--pink-deep);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .card-link:hover { text-decoration: underline; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.6rem;
      font-size: 0.75rem;
    }
    .rating { color: #c8860a; font-weight: 500; }
    .reviews { color: var(--warm-gray); font-weight: 400; }
    .calories { color: var(--warm-gray); }

    /* LOADING / ERROR */
    .state-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--warm-gray);
    }

    .state-msg .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--pink);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 0.8rem;
      padding: 1rem 1.5rem;
      max-width: 400px;
      margin: 2rem auto;
      font-size: 0.85rem;
      color: #c0392b;
      text-align: center;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.72rem;
      color: var(--warm-gray);
      border-top: 1px solid rgba(61,31,15,0.08);
    }

    footer a { color: var(--pink-deep); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <p class="header-eyebrow">Fresh Every Monday</p>
  <h1>Crumbl <span>Weekly</span> Menu</h1>
  <p class="week-label" id="weekLabel">Loading this week's flavors...</p>
</header>

<div class="refresh-bar">
  <button class="refresh-btn" id="refreshBtn" onclick="loadCookies()">↻ Refresh Menu</button>
  <button class="refresh-btn download-btn" id="downloadBtn" onclick="downloadAllImages()" style="display:none">⬇ Download All Images</button>
  <span class="fetch-time" id="fetchTime"></span>
</div>

<div id="app"></div>

<footer>
  
</footer>

<script>
  async function loadCookies() {
    const app = document.getElementById('app');
    const btn = document.getElementById('refreshBtn');
    const weekLabel = document.getElementById('weekLabel');
    const fetchTime = document.getElementById('fetchTime');

    btn.classList.add('loading');
    btn.textContent = '↻ Fetching...';

    app.innerHTML = `<div class="state-msg"><div class="spinner"></div><p>Fetching this week's cookies...</p></div>`;

    try {
      const res = await fetch('/api/cookies');
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      if (data.error) throw new Error(data.error);

      weekLabel.textContent = data.weekRange ? `Week of ${data.weekRange}` : '';

      if (data.fetchedAt) {
        const d = new Date(data.fetchedAt);
        fetchTime.textContent = `Last fetched: ${d.toLocaleString()}`;
      }

      if (!data.cookies || data.cookies.length === 0) {
        app.innerHTML = `<div class="error-msg">No cookies found. Crumbl may have updated their site layout.</div>`;
        return;
      }

      const weekly  = data.cookies.filter(c => c.availability === 'weekly');
      const today   = data.cookies.filter(c => c.availability === 'today');
      const classic = data.cookies.filter(c => c.availability === 'classic');

      let html = '';

      if (weekly.length || today.length) {
        html += `
          <div class="section-label">
            <h2>This Week's Flavors</h2>
            <p>Limited time — available Mon–Sat</p>
            <div class="divider"></div>
          </div>
          <div class="cookies-grid">
            ${[...weekly, ...today].map(renderCard).join('')}
          </div>`;
      }

      if (classic.length) {
        html += `
          <div class="section-label">
            <h2>Classic Flavors</h2>
            <p>Always available, any time</p>
            <div class="divider"></div>
          </div>
          <div class="cookies-grid">
            ${classic.map(renderCard).join('')}
          </div>`;
      }

      app.innerHTML = html;
      showDownloadBtn();

    } catch (err) {
      app.innerHTML = `<div class="error-msg">⚠️ ${err.message}<br><br>Try refreshing or check back later.</div>`;
      console.error(err);
    } finally {
      btn.classList.remove('loading');
      btn.textContent = '↻ Refresh Menu';
    }
  }

  function renderCard(cookie) {
    const badgeLabel = cookie.highlightTag || (cookie.availability === 'weekly' ? 'This Week' :
                       cookie.availability === 'today' ? 'Today Only' : 'Always Available');
    const imgSrc = cookie.image || '';
    const desc   = cookie.description || '';
    const link   = cookie.profileUrl
      ? `<a class="card-link" href="${cookie.profileUrl}" target="_blank">View Details →</a>`
      : '';
    const stars  = cookie.rating ? `<span class="rating">★ ${cookie.rating.toFixed(1)} <span class="reviews">(${(cookie.reviews||0).toLocaleString()})</span></span>` : '';
    const cals   = cookie.calories ? `<span class="calories">${cookie.calories} cal</span>` : '';

    return `
      <div class="cookie-card">
        <div class="card-image-wrap">
          ${imgSrc ? `<img src="${imgSrc}" alt="${cookie.name}" loading="lazy" onerror="this.style.display='none'" />` : ''}
          <span class="badge ${cookie.availability}">${badgeLabel}</span>
        </div>
        <div class="card-body">
          <h3>${cookie.name}</h3>
          ${desc ? `<p>${desc}</p>` : ''}
          <div class="card-meta">${stars}${cals}</div>
          ${link}
        </div>
      </div>`;
  }

  // Show download button once cookies are loaded
  function showDownloadBtn() {
    document.getElementById('downloadBtn').style.display = 'inline-block';
  }

  async function downloadAllImages() {
    const btn = document.getElementById('downloadBtn');
    const imgs = [...document.querySelectorAll('.card-image-wrap img')];
    if (!imgs.length) return;

    btn.textContent = '⏳ Downloading...';
    btn.classList.add('loading');

    let count = 0;
    for (const img of imgs) {
      const url = img.src;
      const name = img.alt || 'cookie';
      const filename = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '.png';

      try {
        const res = await fetch(url);
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
        count++;
        btn.textContent = `⏳ ${count}/${imgs.length}...`;
        // Small delay to avoid browser blocking multiple downloads
        await new Promise(r => setTimeout(r, 600));
      } catch (e) {
        console.error('Failed to download', filename, e);
      }
    }

    btn.textContent = `✓ Downloaded ${count} images`;
    btn.classList.remove('loading');
    setTimeout(() => { btn.textContent = '⬇ Download All Images'; }, 3000);
  }

  // Load on page open
  loadCookies();
</script>
</body>
</html>
