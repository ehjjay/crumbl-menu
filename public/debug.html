<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Crumbl API Debug</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #111; color: #eee; }
    pre { background: #1e1e1e; padding: 1rem; border-radius: 8px; overflow: auto; font-size: 0.8rem; white-space: pre-wrap; }
    button { background: #e8728f; color: #fff; border: none; padding: 0.5rem 1.2rem; border-radius: 4px; cursor: pointer; margin-bottom: 1rem; font-size: 1rem; }
  </style>
</head>
<body>
  <h2>🍪 Crumbl API Debug</h2>
  <button onclick="load()">Fetch /api/cookies</button>
  <pre id="out">Click the button to test...</pre>
  <script>
    async function load() {
      document.getElementById('out').textContent = 'Loading...';
      try {
        const res = await fetch('/api/cookies');
        const data = await res.json();
        document.getElementById('out').textContent = JSON.stringify(data, null, 2);
      } catch(e) {
        document.getElementById('out').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
